name: fashionmart

services:
  postgres:
    image: postgres:16-alpine
    container_name: fashionmart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fashionmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fashionmart_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fashionmart"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fashionmart-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fashionmart-image
    container_name: fashionmart-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=fashionmart;Username=postgres;Password=postgres"
    ports:
      - "8010:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - fashionmart-net

volumes:
  fashionmart_data:
    driver: local

networks:
  fashionmart-net:
    driver: bridge